    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-image: linear-gradient(180deg, #ffafbd 0%, #6dd5ed 100%);
            background-size: 200% 200%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: #333;
        }

        #main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .brand {
            text-align: center;
            padding: 50px 0 30px;
            color: #fff;
            animation: fadeInDown 1s ease;
        }

        .brand-title {
            font-size: 3.5em;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            color: #ffffff;
            letter-spacing: 1px;
        }

        .brand-flag {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 1.6em;
            font-weight: 500;
            backdrop-filter: blur(90px);
            border: 1px solid rgba(255, 175, 189, 0.6);
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 36px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease;
            animation-fill-mode: both;
            border: 2px solid rgba(255, 175, 189, 0.4);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 90px rgba(255, 175, 189, 0.1);
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 175, 189, 0.7);
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 0 10px;
            max-width: 100%;
        }

        .enter-button {
            background: linear-gradient(45deg, #ffafbd, #6dd5ed);
            color: white;
            padding: 16px 20px;
            border-radius: 30px;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            text-align: center;
            border: none;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .enter-button:after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 30px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .enter-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 175, 189, 0.2);
            background: linear-gradient(45deg, #6dd5ed, #ffafbd);
            color: #fff;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .music-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 40px;
            color: #ff6b81;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 999;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 175, 189, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            transition: all 0.3s;
            animation: floatStatus 3s infinite ease-in-out;
            pointer-events: auto;
            /* 允许点击 */
            cursor: pointer;
        }

        .music-status svg {
            width: 1.2em;
            height: 1.2em;
            fill: currentColor;
            vertical-align: middle;
        }

        @keyframes floatStatus {
            0% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-5px);
            }

            100% {
                transform: translateX(-50%) translateY(0);
            }
        }

        .music-prompt {
            position: fixed;
            top: 20px;
            right: -300px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 175, 189, 0.5);
        }

        .music-prompt.show {
            right: 20px;
            animation: slideIn 0.3s ease;
        }

        .music-prompt-text {
            color: #333;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .music-controls {
            display: flex;
            gap: 10px;
        }

        .music-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        }

        .music-btn.accept {
            background: linear-gradient(45deg, #ffafbd, #6dd5ed);
            color: white;
        }

        .music-btn.decline {
            background: #ff4757;
            color: white;
        }

        .music-btn:hover {
            transform: scale(1.1);
        }

        .countdown {
            font-size: 0.8em;
            color: #666;
            opacity: 0.8;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes slideIn {
            from {
                right: -300px;
                opacity: 0;
            }

            to {
                right: 20px;
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .brand-title {
                font-size: 2.5em;
            }

            .button-group {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .card {
                padding: 20px;
            }

            .music-status {
                font-size: 0.85rem;
                padding: 8px 18px;
            }
        }

        @media (max-width: 768px) {
            body {
                background: url('https://www.dmoe.cc/random.php') no-repeat center center fixed,
                    linear-gradient(180deg, #ffafbd 0%, #6dd5ed 100%);
                background-size: cover, 200% 200%;
            }
        }

        @media (min-width: 769px) {
            body {
                background: url('https://www.dmoe.cc/random.php') no-repeat center center fixed,
                    linear-gradient(to right, #ffafbd 0%, #6dd5ed 100%);
                background-size: cover, 200% 200%;
            }
        }

        .enter-button svg {
            width: 1.2em;
            height: 1.2em;
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>

    <!-- 音乐状态条 (可点击) -->
    <div class="music-status" id="musicStatus">
        <svg t="1772715925491" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"
            p-id="5355" width="1.2em" height="1.2em" fill="currentColor">
            <path
                d="M875.52 433.152q-7.168-1.024-12.8-10.24t-8.704-33.792q-5.12-39.936-26.112-58.88t-65.024-27.136q-46.08-9.216-81.408-37.376t-58.88-52.736q-22.528-21.504-34.816-15.36t-12.288 22.528l0 44.032 0 96.256q0 57.344-0.512 123.904t-0.512 125.952l0 104.448 0 58.368q1.024 24.576-7.68 54.784t-32.768 56.832-64 45.568-99.328 22.016q-60.416 3.072-109.056-21.504t-75.264-61.952-26.112-81.92 38.4-83.456 81.92-54.272 84.992-16.896 73.216 5.632 47.616 13.312l0-289.792q0-120.832 1.024-272.384 0-29.696 15.36-48.64t40.96-22.016q21.504-3.072 35.328 8.704t28.16 32.768 35.328 47.616 56.832 52.224q30.72 23.552 53.76 33.792t43.008 18.944 39.424 20.992 43.008 39.936q23.552 26.624 28.672 55.296t0.512 52.224-14.848 38.4-17.408 13.824z"
                p-id="5356"></path>
        </svg>
        <span id="statusText">点击播放音乐</span>
    </div>

    <div class="music-prompt" id="musicPrompt">
        <div class="music-prompt-text">
            是否播放背景音乐？
            <span class="countdown" id="countdown"></span>
        </div>
        <div class="music-controls">
            <button class="music-btn accept" onclick="handleMusic(true, event)"><i class="fas fa-check"></i></button>
            <button class="music-btn decline" onclick="handleMusic(false, event)"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <script>
        const audioManager = {
            audio: null,
            playing: false,
            wasPlayingBeforeHidden: false,
            init() {
                this.audio = document.getElementById('bgMusic');
            },
            async play() {
                if (this.audio && !this.playing) {
                    try {
                        await this.audio.play();
                        this.playing = true;
                        this.updateStatusUI();
                    } catch (err) {
                        this.playing = false;
                        this.updateStatusUI();
                    }
                }
            },
            pause() {
                if (this.audio && this.playing) {
                    this.audio.pause();
                    this.playing = false;
                    this.updateStatusUI();
                }
            },
            toggle() {
                if (this.playing) { this.pause(); } else { this.play(); }
            },
            updateStatusUI() {
                const statusSpan = document.getElementById('statusText');
                if (this.playing) {
                    statusSpan.innerHTML = '背景音乐播放中 · 点击暂停';
                } else {
                    statusSpan.innerHTML = '音乐已暂停 · 点击播放';
                }
            }
        };
        audioManager.init();

        // 仅点击底部音乐状态条切换播放/暂停
        document.getElementById('musicStatus').addEventListener('click', function (e) {
            e.stopPropagation();
            audioManager.toggle();
        });

        document.addEventListener('visibilitychange', async function () {
            if (document.hidden) {
                if (audioManager.playing) {
                    audioManager.pause();
                    audioManager.wasPlayingBeforeHidden = true;
                }
            } else {
                if (audioManager.wasPlayingBeforeHidden) {
                    audioManager.wasPlayingBeforeHidden = false;
                    await audioManager.play();
                }
            }
        });

        let countdownTimer = null;
        let remainingTime = 10;  // 改为10秒
        let eventListenersAttached = false;

        function showMusicPrompt() {
            const musicPrompt = document.getElementById('musicPrompt');
            if (!musicPrompt) return;
            musicPrompt.classList.add('show');
            remainingTime = 10;
            updateCountdown();
            if (!eventListenersAttached) {
                musicPrompt.addEventListener('mouseenter', pauseCountdown);
                musicPrompt.addEventListener('mouseleave', resumeCountdown);
                eventListenersAttached = true;
            }
            startCountdown();
        }

        function updateCountdown() {
            const countdownEl = document.getElementById('countdown');
            if (countdownEl) countdownEl.textContent = `${remainingTime}s`;
        }

        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                remainingTime--;
                updateCountdown();
                if (remainingTime <= 0) {
                    audioManager.play();
                    hideMusicPrompt();
                }
            }, 1000);
        }

        function pauseCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function resumeCountdown() {
            if (!countdownTimer && remainingTime > 0) {
                startCountdown();
            }
        }

        function hideMusicPrompt() {
            const musicPrompt = document.getElementById('musicPrompt');
            if (!musicPrompt) return;
            if (countdownTimer) clearInterval(countdownTimer);
            musicPrompt.style.right = '-300px';
            musicPrompt.style.opacity = '0';
            setTimeout(() => {
                musicPrompt.classList.remove('show');
                musicPrompt.style.opacity = '';
                musicPrompt.style.right = '';
                eventListenersAttached = false;
            }, 300);
        }

        function handleMusic(accepted, ev) {
            if (ev) ev.stopPropagation();
            if (accepted) {
                audioManager.play();
            }
            hideMusicPrompt();
        }

        window.addEventListener('load', function () {
            setTimeout(showMusicPrompt, 1000);
        });

        audioManager.updateStatusUI();
    </script>
